{{ with .Params.externalUrl }}
  {{ if strings.Contains . "substack.com" }}
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');
      @keyframes substack-shine {
        0% { left: -100%; }
        20% { left: 100%; }
        100% { left: 100%; }
      }
    </style>
    <a href="{{ . }}" target="_blank" rel="external" style="display:inline-flex;align-items:center;margin-left:8px;vertical-align:middle;text-decoration:none !important;line-height:1;">
      <span style="display:inline-flex;align-items:center;height:20px;border-radius:4px;overflow:hidden;font-family:'Inter',sans-serif;line-height:20px;background:#FF6719;box-shadow:0 1px 3px rgba(255,103,25,.35),0 0 0 .5px rgba(255,103,25,.15);padding:0 7px;gap:5px;position:relative;">
        <span style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.45) 48%,rgba(255,255,255,.65) 50%,rgba(255,255,255,.45) 52%,transparent 70%);animation:substack-shine 2.5s ease-in-out infinite;pointer-events:none;"></span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;position:relative;"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24l10.54-7.056L22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z" fill="#fff"/></svg>
        <span style="color:#fff;font-size:11px;font-weight:500;letter-spacing:.02em;position:relative;">substack</span>
      </span>
    </a>
  {{ end }}
{{ end }}
