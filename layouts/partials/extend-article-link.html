{{ with .Params.externalUrl }}
  {{ if strings.Contains . "substack.com" }}
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');
      @keyframes substack-shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
    </style>
    <a href="{{ . }}" target="_blank" rel="external" style="display:inline-flex;align-items:center;margin-left:8px;vertical-align:middle;text-decoration:none !important;line-height:1;">
      <span style="display:inline-flex;align-items:center;height:20px;border-radius:4px;overflow:hidden;font-family:'Inter',sans-serif;line-height:20px;background:linear-gradient(110deg,#FF6719 0%,#FF6719 40%,#FF8844 50%,#FF6719 60%,#FF6719 100%);background-size:200% 100%;animation:substack-shimmer 3s ease-in-out infinite;box-shadow:0 1px 3px rgba(255,103,25,.3),0 0 0 .5px rgba(255,103,25,.15);padding:0 7px;gap:5px;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24l10.54-7.056L22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z" fill="#fff"/></svg>
        <span style="color:#fff;font-size:11px;font-weight:500;letter-spacing:.02em;">substack</span>
      </span>
    </a>
  {{ end }}
{{ end }}
